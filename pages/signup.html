<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="../css/general.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/signup.css">
</head>
<body>
  <header>
    <div class="left-section">
      <img src="../images/logo.png" alt="Logo" width="50%">
    </div>
    <div class="right-section">
      <a href="../index.html">
        Home
      </a>
      <a href="login.html">
        Log In
      </a>
    </div>
  </header>

  <main>
    <div class="form-container">
      <div class="title"> CREATE ACCOUNT/SIGN UP</div>
      <form class="form">
        <label> Fullname:
          <input type="text" id="fullname" class="name">
        </label>
        <label> Email Address:
          <input type="text" id="email" class="email">
        </label>
        <label> Matric/Reg No:
          <input type="text" id="regMatricNo" class="matric">
        </label>
        <label> Faculty:
          <select name="faculty" id="faculty">
          </select>
        </label>
        <label> Department:
          <select name="department" id="department">
          </select>
        </label>
        <label> Current Level:
          <select name="level" id="level">
            <option value="100">100</option>
            <option value="200">200</option>
            <option value="300">300</option>
            <option value="400">400</option>
            <option value="500">500</option>
          </select>
        </label>
        <label>
          Password:
          <input type="password" id="password" class="password">
        </label>
        <p class="info">
          <i>
            <b>
              (Upload a clear image of your ID Card or Receipt)
            </b>
          </i>
        </p>
        <label> School ID Card:
          <input type="file" class="idCard" accept="image/*">
        </label>
        <label> School Fee Receipt: 
          <input type="file" class="receipt" accept="image/*">
        </label>
        <label> You Selfie Photo:
          <input type="file" class="photo" accept="image/*">
        </label>
        <div id="message" style="display: none;"></div>
        <button class="signup" type="submit">SIGN UP</button>
      </form>
      <div class="terms">
        <input type="radio" class="radio">
        <span> 
          Agree to the terms and condition T&C
        </span>
      </div>
      <!-- <hr> //there should be a line -->
      <div class="ruler">
        <span></span>
          <p>OR</p>
        <span></span>
      </div>

      <div class="redirector">
       Already have an account. <a href="login.html">Login</a>
      </div>
    </div>
  </main>

  <!-- <script src="https://unpkg.com/dayjs@1.11.19/dayjs.min.js"></script> -->
  <script src="../script/authenticate/signup.js" type="module"></script>
</body>
</html>
