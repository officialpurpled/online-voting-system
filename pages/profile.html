<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="../css/general.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/nav.css">
  <link rel="stylesheet" href="../css/profile.css">
  <link rel="stylesheet" href="../css/mediaquery.css">
</head>
<body>
  <header>
    <div class="left-section">
      <img src="../images/logo.png" alt="Logo" width="100%">
    </div>
    <div class="right-section">
      <a href="dashboard.html">
       Dashboard
      </a>
      <a href="#">
        View Result
      </a>
      <a href="../index.html">
        Logout
      </a>

      <div class="display menu-icon">
        <img src="../images/icons/menu-nav.svg" alt="">
      </div>
    </div>
  </header>

  <nav>
    <a href="dashboard.html">
      <img src="../images/icons/home.svg" alt="Dashboard">
      Dashboard
    </a>
    
    <a href="result.html">
      <img src="../images/icons/history.svg" alt="View results"> 
      View Results
    </a>

    <a href="#" class="active">
      <img src="../images/icons/user.svg" alt="">
      My Profile
    </a> 

    <a id="logout">
      <img src="../images/icons/arr-back.svg" alt="">
      Log Out
    </a> 
  </nav>

  <main id="profile">
    <div class="container">
      <div class="container-wrapper">
        <div class="userimg">
          <img src="../images/avatar.jpg" alt="avatar">
          <p>edit photo</p>
        </div>
        <div class="userinfor">
          <div class="biodata">
            <span class="label">BIO DATA</span>
            <div>
              Name: <p> username</p>
            </div>
            <div>
              Email: <p> email</p>
            </div>
            <div>
              Reg/Matric: <p> matric no</p>
            </div>
            <div>
              User ID:<p>  userId</p>
            </div>
            <div>
              Vote count:<p>  vote count</p>
            </div>
          </div>
  
          <div class="stddata">
            <span class="label">STUDENTSHIP DATA</span>
            <div>
              Faculty: <p>faculty</p>
            </div>
            <div>
              Department: <p>department</p>
            </div>
            <div>
              Current Level: <p>level</p>
            </div>
  
            <button> 
              <a href="dashboard.html">
                Back to dashboard 
              </a>
            </button>
          </div>
        </div>
      </div>
      <div class="no-access">
        <div>
          <p>Please Login</p>
          <button>
            <a href="login.html">
              Login 
            </a>
          </button>
        </div>
      </div>
    </div>
  </main>
    <!-- <script src="https://unpkg.com/dayjs@1.11.19/dayjs.min.js"></script> -->

  <script src="../script/profile.js" type="module"></script>
</body>
</html>
